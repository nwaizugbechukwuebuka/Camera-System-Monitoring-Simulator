version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
  dashboard:
    build: ./frontend_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./frontend_dashboard:/app
    environment:
      - PYTHONUNBUFFERED=1
